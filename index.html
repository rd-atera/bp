<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Чек-лист БП проектов — ГК «Атера»</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f5f8;--card:#fff;--brd:#e0e3e8;--tx:#1a1f2b;--tx2:#4a5060;--tx3:#7c8494;
--mg:#1e3a5f;--mg-l:#e8eef6;--sp:#0f766e;--sp-l:#e6f5f3;--dv:#6d28d9;--dv-l:#f0eafc;
--yes:#16a34a;--no:#dc2626;--pt:#d97706;--ac:#1e293b;--sh:0 1px 3px rgba(0,0,0,.06)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',-apple-system,sans-serif;background:var(--bg);color:var(--tx);line-height:1.5;-webkit-font-smoothing:antialiased}

.top{background:var(--ac);color:#fff;padding:14px 28px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.top h1{font-size:16px;font-weight:800;letter-spacing:-.2px}
.top .sub{font-size:11px;color:rgba(255,255,255,.4);font-weight:500}
.top .spacer{flex:1}
.tbtn{border-radius:6px;padding:6px 13px;font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;transition:.12s;border:1px solid transparent;display:inline-flex;align-items:center;gap:4px}
.tbtn.w{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.18);color:#fff}
.tbtn.w:hover{background:rgba(255,255,255,.2)}
.tbtn.grn{background:#16a34a;color:#fff;border-color:#16a34a}.tbtn.grn:hover{background:#15803d}
.tbtn.amb{background:#d97706;color:#fff;border-color:#d97706}.tbtn.amb:hover{background:#b45309}
.tbtn.out{background:#fff;color:var(--tx);border-color:var(--brd)}.tbtn.out:hover{background:#f8f9fb;border-color:#b0b6c2}
.tbtn.ghost{background:none;color:var(--tx2);border:1px solid var(--brd)}.tbtn.ghost:hover{background:#f8f9fb}

.plist{background:var(--card);border-bottom:1px solid var(--brd);padding:10px 28px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;min-height:42px}
.pchip{padding:4px 11px;border-radius:5px;font-size:11.5px;font-weight:600;border:1px solid var(--brd);background:#fff;cursor:pointer;transition:.12s;color:var(--tx2);white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.pchip:hover{border-color:#a0a6b2;background:#f8f9fb}
.pchip.sel{background:var(--ac);color:#fff;border-color:var(--ac)}
.pchip .x{opacity:.4;font-size:12px;margin-left:2px}.pchip .x:hover{opacity:1}

.hdr{background:var(--card);border-bottom:1px solid var(--brd);padding:14px 28px}
.hdr-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.hdr-row label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--tx3)}
.hdr-row input{border:1px solid var(--brd);border-radius:5px;padding:5px 9px;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--tx);outline:none;background:#fafbfc}
.hdr-row input:focus{border-color:#94a3b8;background:#fff}
.hdr-row input[readonly]{background:#f0f1f4;color:var(--tx2);cursor:default}

.lbar{background:var(--card);border-bottom:1px solid var(--brd);padding:9px 28px;display:flex;gap:18px;align-items:center;font-size:10.5px;font-weight:600;color:var(--tx3);flex-wrap:wrap}
.li{display:flex;align-items:center;gap:4px}.ld{width:8px;height:8px;border-radius:2px}
.sbar{background:var(--card);border-bottom:1px solid var(--brd);padding:9px 28px;display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.stt{display:flex;align-items:baseline;gap:4px}
.snm{font-size:17px;font-weight:800;color:var(--ac)}
.sla{font-size:9.5px;font-weight:600;color:var(--tx3);text-transform:uppercase;letter-spacing:.4px}

.cnt{padding:16px 28px 60px;max-width:1520px}
.pg{margin-bottom:22px}
.gh{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px 8px 0 0;color:#fff}
.gh.m{background:var(--mg)}.gh.s{background:var(--sp)}.gh.d{background:var(--dv)}
.gh h2{font-size:13px;font-weight:700;flex:1}.gh .gc{font-size:10px;font-weight:600;background:rgba(255,255,255,.2);padding:2px 8px;border-radius:12px}

.pt{width:100%;border-collapse:collapse;background:var(--card);border-radius:0 0 8px 8px;overflow:hidden;box-shadow:var(--sh)}
.pt th{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);padding:7px 9px;text-align:left;border-bottom:2px solid var(--brd);background:#fafbfc}
.pt th.tc{text-align:center}
.pt td{padding:6px 9px;border-bottom:1px solid var(--brd);font-size:12px;vertical-align:middle}
.pt tr:last-child td{border-bottom:none}

.cr td{font-weight:700;font-size:11px;letter-spacing:.2px;padding:6px 9px}
.cr.m td{background:var(--mg-l);color:var(--mg);border-left:3px solid var(--mg)}
.cr.s td{background:var(--sp-l);color:var(--sp);border-left:3px solid var(--sp)}
.cr.d td{background:var(--dv-l);color:var(--dv);border-left:3px solid var(--dv)}

.code{color:var(--tx3);font-size:10.5px;font-weight:700;text-align:center;white-space:nowrap}
.pn{font-weight:600;color:var(--tx);line-height:1.35;font-size:12px}

.ct{display:flex;justify-content:center;gap:2px}
.cb{width:27px;height:23px;border:1.5px solid var(--brd);border-radius:4px;background:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:.1s;color:var(--tx3);font-family:inherit}
.cb:hover{border-color:#a0a6b2}
.cb.y.a{background:#dcfce7;border-color:var(--yes);color:var(--yes)}
.cb.p.a{background:#fef3c7;border-color:var(--pt);color:var(--pt)}
.cb.n.a{background:#fee2e2;border-color:var(--no);color:var(--no)}

.sb{display:inline-block;padding:2px 7px;border-radius:3px;font-size:9.5px;font-weight:700}
.sb.sy{background:#dcfce7;color:var(--yes)}.sb.sp{background:#fef3c7;color:var(--pt)}
.sb.sn{background:#fee2e2;color:var(--no)}.sb.su{background:#f0f1f4;color:var(--tx3)}

.ef{width:100%;min-height:30px;border:1px solid var(--brd);border-radius:4px;padding:4px 7px;font-family:inherit;font-size:11.5px;color:var(--tx2);background:#fafbfc;resize:none;outline:none;overflow:hidden;line-height:1.4}
.ef:hover{border-color:#aeb4c0}.ef:focus{border-color:#94a3b8;background:#fff}
.ef::placeholder{color:#c5c9d2}

.vt{font-size:11.5px;color:var(--tx2);line-height:1.35;min-height:18px}
.vt.e{color:#ccc;font-style:italic}

.add-btn{display:inline-flex;align-items:center;gap:3px;font-size:9.5px;font-weight:600;color:var(--tx3);background:none;border:1px dashed var(--brd);border-radius:3px;padding:2px 6px;cursor:pointer;margin-top:3px;font-family:inherit}
.add-btn:hover{color:var(--tx2);border-color:#aeb4c0;background:#f4f5f7}
.sub-row td{border-bottom:1px solid #eeeff2;background:#fafafc}
.rm-btn{font-size:14px;color:#ccc;cursor:pointer;border:none;background:none;padding:0 2px;font-family:inherit;line-height:1}
.rm-btn:hover{color:var(--no)}

.fb{position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:100}
.fb .tbtn{box-shadow:0 3px 10px rgba(0,0,0,.12);font-size:11.5px;padding:8px 14px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:10px;padding:24px;width:420px;max-width:92vw;box-shadow:0 20px 40px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:700;margin-bottom:12px}
.modal label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--tx3);margin-bottom:4px;margin-top:12px}
.modal input{width:100%;border:1px solid var(--brd);border-radius:5px;padding:7px 10px;font-family:inherit;font-size:13px;outline:none}
.modal input:focus{border-color:#94a3b8}
.modal .hint{font-size:10.5px;color:var(--tx3);margin-top:3px;line-height:1.4}
.modal .mbtns{display:flex;gap:8px;margin-top:18px;justify-content:flex-end}

.sync{font-size:10px;font-weight:600;padding:3px 8px;border-radius:4px;display:inline-flex;align-items:center;gap:3px}
.sync.ok{background:#dcfce7;color:var(--yes)}.sync.err{background:#fee2e2;color:var(--no)}.sync.load{background:#fef3c7;color:var(--pt)}

/* Debug bar */
.dbg{background:#fffbeb;border-bottom:1px solid #fde68a;padding:6px 28px;font-size:10.5px;color:#92400e;font-weight:500;display:none}
.dbg.show{display:block}

@media print{
  .top,.plist,.fb,.add-btn,.rm-btn,.modal-bg,.dbg{display:none!important}
  .hdr{padding:10px 14px}.cnt{padding:6px 14px}
  .pt td,.pt th{padding:3px 5px;font-size:9.5px}
  .ef{min-height:14px;padding:1px 3px;font-size:9px;border:1px solid #ddd!important;background:#fff!important;overflow:visible!important;height:auto!important}
  body{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:900px){.top,.hdr,.cnt,.lbar,.sbar,.plist{padding-left:12px;padding-right:12px}}
</style>
</head>

<div class="fb" id="fb"></div>
<div id="modalRoot"></div>

<script>
/* ═══ Template ═══ */
const TPL=[

{name:"Управление рисками и комплаенс",items:["Идентификация, оценка и митигация рисков проекта","Внутренний контроль и комплаенс"]},
{name:"Управление эффективностью",items:["Система KPI проекта и мониторинг показателей","Управленческая отчётность для руководства и инвесторов"]},
]},

{name:"Учёт и регламентированная отчётность",items:["Бухгалтерский учёт","Налоговый учёт","Расчёты с персоналом (начисление ЗП, налоги, отчётность)","Учёт МПЗ и основных средств","Формирование регламентированной отчётности"]},

{name:"Инновации и R&D",items:["Внедрение новых технологий строительства","Развитие продуктовой линейки и стандартов качества"]},

const GN={m:1,s:2,d:3};

/* ═══ GitHub ═══ */
function autoDetect(){
  const m=location.hostname.match(/^(.+)\.github\.io$/);
  if(m){const o=m[1],r=location.pathname.split('/').filter(Boolean)[0]||'';return{owner:o,repo:r};}
  return null;
}
function cfg(){
  const a=autoDetect();
  return{
    owner:localStorage.getItem('gh_owner')||(a?a.owner:''),
    repo:localStorage.getItem('gh_repo')||(a?a.repo:''),
    token:localStorage.getItem('gh_token')||'',
    path:localStorage.getItem('gh_path')||'data.json'
  };
}
let ghSha=null;

function dbg(msg){const el=document.getElementById('dbg');el.classList.add('show');el.textContent=msg;console.log('[DBG]',msg);}

async function ghLoad(){
  const c=cfg();
  if(!c.owner||!c.repo){dbg('GitHub не настроен: owner='+c.owner+' repo='+c.repo);return null;}
  setSS('load','Загрузка…');
  dbg('Загрузка: '+c.owner+'/'+c.repo+'/'+c.path);
  try{
    // Method: request RAW content directly from GitHub API (no base64)
    const url=`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}`;
    const hdrs={'Accept':'application/vnd.github.raw+json'};
    if(c.token)hdrs['Authorization']='token '+c.token;
    const r=await fetch(url,{headers:hdrs,cache:'no-store'});
    if(!r.ok){
      const status=r.status;
      if(status===404){dbg('Файл data.json не найден в репо — это нормально для первого запуска');setSS('','');return null;}
      dbg('Ошибка API: HTTP '+status);setSS('err','HTTP '+status);return null;
    }
    const data=await r.json();

    // Get SHA separately for future saves
    try{
      const mr=await fetch(url,{headers:{'Accept':'application/vnd.github.v3+json',...(c.token?{'Authorization':'token '+c.token}:{})}});
      if(mr.ok){const mj=await mr.json();ghSha=mj.sha;}
    }catch(e){}

    // Diagnostics
    const pkeys=Object.keys(data);
    let totalRows=0;
    pkeys.forEach(pk=>{if(data[pk]&&data[pk].rows)totalRows+=Object.keys(data[pk].rows).length;});
    dbg('OK: '+pkeys.length+' проект(ов), '+totalRows+' строк с данными. Ключи: '+pkeys.join(', '));

    if(totalRows>0)setSS('ok','Загружено ✓');
    else setSS('ok','Загружено (строки пустые)');
    setTimeout(()=>setSS('',''),4000);
    return data;
  }catch(e){dbg('Ошибка загрузки: '+e.message);setSS('err',e.message);return null;}
}

async function ghSave(data){
  const c=cfg();
  if(!c.owner||!c.repo||!c.token){setSS('err','Настройте GitHub (токен)');return false;}
  setSS('load','Сохранение…');

  // Diagnostics before save
  const pkeys=Object.keys(data);
  let totalRows=0;
  pkeys.forEach(pk=>{if(data[pk]&&data[pk].rows)totalRows+=Object.keys(data[pk].rows).length;});
  dbg('Сохранение: '+pkeys.length+' проект(ов), '+totalRows+' строк');

  try{
    const url=`https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}`;
    // Get current SHA
    if(!ghSha){
      try{
        const gr=await fetch(url,{headers:{'Authorization':'token '+c.token,'Accept':'application/vnd.github.v3+json'}});
        if(gr.ok){const gj=await gr.json();ghSha=gj.sha;}
      }catch(e){}
    }
    // Encode JSON → UTF-8 → base64
    const jsonStr=JSON.stringify(data,null,2);
    const bytes=new TextEncoder().encode(jsonStr);
    let bin='';for(let i=0;i<bytes.length;i++)bin+=String.fromCharCode(bytes[i]);
    const b64=btoa(bin);

    const body={message:'Обновление чек-листа БП — '+new Date().toLocaleString('ru'),content:b64};
    if(ghSha)body.sha=ghSha;
    const r=await fetch(url,{method:'PUT',headers:{'Authorization':'token '+c.token,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(!r.ok){const t=await r.text();dbg('Ошибка сохранения: '+r.status+' '+t);setSS('err','Ошибка '+r.status);return false;}
    const j=await r.json();
    ghSha=j.content.sha;
    dbg('Сохранено! SHA: '+ghSha.substring(0,8));
    setSS('ok','Сохранено ✓');
    setTimeout(()=>setSS('',''),3000);
    return true;
  }catch(e){dbg('Ошибка сети: '+e.message);setSS('err',e.message);return false;}
}

function setSS(t,m){const el=document.getElementById('syncStatus');if(!m){el.innerHTML='';return;}el.innerHTML=`<span class="sync ${t}">${m}</span>`;}

/* ═══ State ═══ */
let projects={};
let curId=null;
let editMode=false;

function localSave(){localStorage.setItem('atera_bp_v2',JSON.stringify({projects,curId}));}
function localLoad(){try{const d=JSON.parse(localStorage.getItem('atera_bp_v2')||'{}');if(d.projects)projects=d.projects;if(d.curId)curId=d.curId;}catch(e){}}

/* ═══ CRUD ═══ */
function newProject(){
  const n=prompt('Название проекта:');if(!n||!n.trim())return;
  const id='p'+Date.now();
  projects[id]={name:n.trim(),date:todayStr(),owner:'',rows:{}};
  curId=id;editMode=true;localSave();renderAll();
}
function openProject(id){curId=id;editMode=false;localSave();renderAll();}
function delProject(id,e){
  e.stopPropagation();if(!confirm('Удалить «'+projects[id].name+'»?'))return;
  delete projects[id];if(curId===id)curId=Object.keys(projects)[0]||null;
  localSave();renderAll();
}

/* ═══ Collect (ONLY in edit mode) ═══ */
function collect(){
  if(!curId||!projects[curId]||!editMode)return;
  const p=projects[curId];
  p.name=document.getElementById('inp_name')?.value||p.name;
  p.date=document.getElementById('inp_date')?.value||p.date;
  p.owner=document.getElementById('inp_owner')?.value||p.owner;
  const trs=document.querySelectorAll('tr[data-rk]');
  if(!trs.length)return; // guard: no table rendered
  p.rows={};
  trs.forEach(tr=>{
    const k=tr.dataset.rk;
    const st=tr.querySelector('.cb.a');
    const tas=tr.querySelectorAll('.ef');
    p.rows[k]={s:st?(st.classList.contains('y')?'y':st.classList.contains('p')?'p':'n'):'',b:tas[0]?.value||'',d:tas[1]?.value||'',c:tas[2]?.value||''};
    let subs=[],nx=tr.nextElementSibling;
    while(nx&&nx.dataset.parent===k){
      const sst=nx.querySelector('.cb.a');const stas=nx.querySelectorAll('.ef');
      subs.push({s:sst?(sst.classList.contains('y')?'y':sst.classList.contains('p')?'p':'n'):'',b:stas[0]?.value||'',d:stas[1]?.value||'',c:stas[2]?.value||''});
      nx=nx.nextElementSibling;
    }
    if(subs.length)p.rows[k].subs=subs;
  });
  localSave();
}

/* ═══ Render ═══ */
function renderAll(){renderPlist();renderHdr();renderTable();renderFb();updC();}

function renderPlist(){
  const el=document.getElementById('plist'),ids=Object.keys(projects);
  if(!ids.length){el.innerHTML='<span style="font-size:11px;color:var(--tx3)">Нет проектов</span>';return;}
  el.innerHTML=ids.map(id=>`<div class="pchip ${id===curId?'sel':''}" onclick="openProject('${id}')">${esc(projects[id].name)}<span class="x" onclick="delProject('${id}',event)">×</span></div>`).join('');
}
function renderHdr(){
  const el=document.getElementById('hdr');
  if(!curId||!projects[curId]){el.innerHTML='';return;}
  const p=projects[curId],ro=editMode?'':'readonly';
  el.innerHTML=`<div class="hdr-row">
    <label>Проект:</label><input id="inp_name" value="${esc(p.name)}" ${ro} style="width:280px" oninput="collect()">
    <label>Дата:</label><input id="inp_date" value="${esc(p.date)}" ${ro} style="width:110px" oninput="collect()">
    <label>Заполнил:</label><input id="inp_owner" value="${esc(p.owner)}" ${ro} style="width:220px" placeholder="ФИО, должность" oninput="collect()">
    <span style="flex:1"></span>
    <span style="font-size:10px;font-weight:700;color:${editMode?'var(--yes)':'var(--tx3)'};background:${editMode?'#dcfce7':'#f0f1f4'};padding:3px 9px;border-radius:4px">${editMode?'✎ Редактирование':'👁 Просмотр'}</span>
  </div>`;
}
function renderFb(){
  const el=document.getElementById('fb');
  if(!curId){el.innerHTML='';return;}
  if(editMode){
    el.innerHTML=`<button class="tbtn ghost" onclick="switchView()">👁 Просмотр</button><button class="tbtn grn" onclick="doSave()">💾 Сохранить</button><button class="tbtn out" onclick="window.print()">⎙ Печать</button>`;
  }else{
    el.innerHTML=`<button class="tbtn amb" onclick="switchEdit()">✎ Редактировать</button><button class="tbtn out" onclick="window.print()">⎙ Печать</button>`;
  }
}
function switchEdit(){editMode=true;renderAll();}
function switchView(){collect();editMode=false;renderAll();}
async function doSave(){
  collect();
  const ok=await ghSave(projects);
  if(!ok&&!cfg().token){if(confirm('Токен не настроен. Настроить?'))showSettings();}
  renderPlist();
}
async function doReload(){
  const d=await ghLoad();
  if(d&&typeof d==='object'){projects=d;if(!curId||!projects[curId])curId=Object.keys(projects)[0]||null;localSave();editMode=false;renderAll();}
  else{toast('Нет данных на сервере');}
}

function renderTable(){
  const root=document.getElementById('C');
  if(!curId||!projects[curId]){root.innerHTML='<div style="text-align:center;padding:50px;color:var(--tx3)">Выберите или создайте проект</div>';document.getElementById('zt').textContent=0;document.getElementById('zu').textContent=0;return;}
  const p=projects[curId];let html='',total=0;
  TPL.forEach((g,gi)=>{
    const gn=GN[g.cls];let gc=0;g.cats.forEach(c=>gc+=c.items.length);total+=gc;
    html+=`<div class="pg"><div class="gh ${g.cls}"><h2>${g.group}</h2><span class="gc">${gc}</span></div>`;
    html+=`<table class="pt"><thead><tr><th class="tc" style="width:48px">№</th><th style="min-width:230px">Подпроцесс</th><th class="tc" style="width:100px">Статус</th><th style="width:165px">Ответственный блок</th><th style="width:175px">Ответств. подразделение</th><th style="width:195px">Комментарий</th></tr></thead><tbody>`;
    let n=0;
    g.cats.forEach((cat,ci)=>{
      html+=`<tr class="cr ${g.cls}"><td colspan="6">${cat.name}</td></tr>`;
      cat.items.forEach((item,ii)=>{
        n++;const code=gn+'.'+n,k=g.cls+'_'+n;
        const rd=p.rows[k]||{s:'',b:'',d:'',c:''};
        const subs=rd.subs||[];const rs=1+subs.length;
        html+=`<tr data-rk="${k}"><td class="code" data-k="${k}" rowspan="${rs}">${code}</td><td style="vertical-align:middle" data-k="${k}" rowspan="${rs}"><div class="pn">${item}</div>${editMode?`<button class="add-btn" onclick="addR('${k}')">＋ ещё ответственный</button>`:''}</td>${sCell(rd.s)}${fCell(rd.b,'Блок')}${fCell(rd.d,'Подразделение')}${fCell(rd.c,'Комментарий')}</tr>`;
        subs.forEach(sr=>{
          html+=`<tr class="sub-row" data-parent="${k}">${sCell(sr.s)}${fCell(sr.b,'Блок')}${fCell(sr.d,'Подразделение')}<td style="vertical-align:middle">${editMode?`<div style="display:flex;gap:3px;align-items:start"><textarea class="ef" rows="1" placeholder="За что отвечает">${esc(sr.c)}</textarea><button class="rm-btn" onclick="rmR(this)">×</button></div>`:`<div class="vt ${sr.c?'':'e'}">${esc(sr.c)||'—'}</div>`}</td></tr>`;
        });
      });
    });
    html+=`</tbody></table></div>`;
  });
  root.innerHTML=html;document.getElementById('zt').textContent=total;
}
function sCell(s){
  if(editMode)return`<td style="text-align:center;vertical-align:middle"><div class="ct"><button class="cb y ${s==='y'?'a':''}" onclick="tog(this)">✓</button><button class="cb p ${s==='p'?'a':''}" onclick="tog(this)">◐</button><button class="cb n ${s==='n'?'a':''}" onclick="tog(this)">✗</button></div></td>`;
  if(s==='y')return'<td style="text-align:center"><span class="sb sy">Да</span></td>';
  if(s==='p')return'<td style="text-align:center"><span class="sb sp">Частично</span></td>';
  if(s==='n')return'<td style="text-align:center"><span class="sb sn">Нет</span></td>';
  return'<td style="text-align:center"><span class="sb su">—</span></td>';
}
function fCell(v,ph){
  if(editMode)return`<td style="vertical-align:middle"><textarea class="ef" rows="1" placeholder="${ph}">${esc(v)}</textarea></td>`;
  return`<td style="vertical-align:middle"><div class="vt ${v?'':'e'}">${esc(v)||'—'}</div></td>`;
}

/* ═══ Interactions ═══ */
function tog(btn){const w=btn.classList.contains('a');btn.parentElement.querySelectorAll('.cb').forEach(b=>b.classList.remove('a'));if(!w)btn.classList.add('a');updC();}
function updC(){
  let y=0,p=0,n=0;document.querySelectorAll('tr[data-rk] .cb.a').forEach(b=>{if(b.classList.contains('y'))y++;else if(b.classList.contains('p'))p++;else if(b.classList.contains('n'))n++;});
  const t=+document.getElementById('zt').textContent;
  document.getElementById('zy').textContent=y;document.getElementById('zp').textContent=p;document.getElementById('zn').textContent=n;document.getElementById('zu').textContent=Math.max(0,t-y-p-n);
}
function addR(k){collect();const p=projects[curId];if(!p.rows[k])p.rows[k]={s:'',b:'',d:'',c:''};if(!p.rows[k].subs)p.rows[k].subs=[];p.rows[k].subs.push({s:'',b:'',d:'',c:''});localSave();renderTable();updC();}
function rmR(btn){collect();const tr=btn.closest('tr'),k=tr.dataset.parent;let idx=0,nx=document.querySelector(`tr[data-rk="${k}"]`).nextElementSibling;while(nx&&nx!==tr){if(nx.dataset.parent===k)idx++;nx=nx.nextElementSibling;}const p=projects[curId];if(p.rows[k]?.subs)p.rows[k].subs.splice(idx,1);localSave();renderTable();updC();}

/* ═══ Settings ═══ */
function showSettings(){
  const c=cfg();
  document.getElementById('modalRoot').innerHTML=`<div class="modal-bg" onclick="if(event.target===this)closeModal()"><div class="modal">
    <h3>⚙ Настройки GitHub</h3>
    <p style="font-size:11.5px;color:var(--tx2);line-height:1.5">Для общего доступа данные хранятся в GitHub. Owner и repo определяются автоматически из URL сайта. Токен нужен только для сохранения.</p>
    <label>Владелец (owner)</label><input id="s_owner" value="${esc(c.owner)}" placeholder="rd-atera">
    <label>Репозиторий</label><input id="s_repo" value="${esc(c.repo)}" placeholder="bp">
    <label>Файл данных</label><input id="s_path" value="${esc(c.path)}" placeholder="data.json">
    <label>Personal Access Token (для сохранения)</label><input id="s_token" value="${esc(c.token)}" placeholder="github_pat_..." type="password">
    <div class="hint">GitHub → Settings → Developer settings → Personal access tokens → Fine-grained → Contents: Read and Write</div>
    <div class="mbtns"><button class="tbtn ghost" onclick="closeModal()">Отмена</button><button class="tbtn grn" onclick="saveSettings()">Сохранить</button></div>
  </div></div>`;
}
function closeModal(){document.getElementById('modalRoot').innerHTML='';}
function saveSettings(){
  localStorage.setItem('gh_owner',document.getElementById('s_owner').value.trim());
  localStorage.setItem('gh_repo',document.getElementById('s_repo').value.trim());
  localStorage.setItem('gh_path',document.getElementById('s_path').value.trim()||'data.json');
  localStorage.setItem('gh_token',document.getElementById('s_token').value.trim());
  closeModal();toast('Настройки сохранены');
}

/* ═══ Util ═══ */
document.addEventListener('input',function(e){if(e.target.classList.contains('ef')){e.target.style.height='auto';e.target.style.height=Math.max(30,e.target.scrollHeight)+'px';}});
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function todayStr(){const d=new Date();return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();}
function toast(msg){const t=document.createElement('div');t.textContent=msg;Object.assign(t.style,{position:'fixed',bottom:'60px',right:'16px',background:'#1e293b',color:'#fff',padding:'7px 16px',borderRadius:'6px',fontSize:'12px',fontWeight:'600',fontFamily:'inherit',zIndex:'200',boxShadow:'0 4px 12px rgba(0,0,0,.15)',opacity:'0',transition:'opacity .2s'});document.body.appendChild(t);requestAnimationFrame(()=>t.style.opacity='1');setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},1800);}

/* ═══ Init ═══ */
(async function(){
  localLoad();
  renderAll(); // show local data immediately
  const d=await ghLoad();
  if(d&&typeof d==='object'){
    projects=d;
    if(!curId||!projects[curId])curId=Object.keys(projects)[0]||null;
    localSave();
    editMode=false;
    renderAll(); // re-render with server data
  }
})();
</script>
</body>
</html>
